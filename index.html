<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #2a2a2a;
  --white: #f5f5f5;
  --muted: #555;
  --green: #00e676;
  --blue: #448aff;
  --pink: #ff4081;
}

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 20px 80px;
}

.container {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Checkerboard Avatar ── */
.avatar-wrap {
  position: relative;
  width: 96px;
  height: 96px;
  margin-bottom: 20px;
  animation: fade-up 0.5s ease both;
}

.checker-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%) 0 0 / 12px 12px;
  z-index: 0;
}

.avatar-face {
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: repeating-conic-gradient(#1c1c1c 0% 25%, #f0f0f0 0% 50%) 0 0 / 16px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  overflow: hidden;
}

.avatar-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.avatar-initials {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  text-shadow: 0 0 10px rgba(0,230,118,0.7);
}

/* ── Name & handle ── */
.name {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--white);
  text-align: center;
  margin-bottom: 6px;
  animation: fade-up 0.5s ease 0.08s both;
}

.handle {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 40px;
  animation: fade-up 0.5s ease 0.13s both;
}

/* ── Links ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link-card {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 15px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--white);
  transition: border-color 0.15s, transform 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}

.link-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--accent, var(--green));
  opacity: 0;
  transition: opacity 0.15s;
}

.link-card:hover {
  border-color: var(--accent, var(--green));
  transform: translateX(4px);
  background: #2e2e2e;
}

.link-card:hover::before { opacity: 1; }
.link-card:active { transform: scale(0.98) translateX(2px); }

.link-card.g { --accent: var(--green); }
.link-card.b { --accent: var(--blue); }
.link-card.p { --accent: var(--pink); }
.link-card.w { --accent: #f5f5f5; }

.icon-box {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #1f1f1f;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
  transition: border-color 0.15s;
}

.link-card:hover .icon-box {
  border-color: var(--accent, var(--green));
}

.link-text { flex: 1; }
.link-title { display: block; font-weight: 600; font-size: 14px; }
.link-sub   { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

.link-arrow {
  color: var(--muted);
  font-size: 14px;
  transition: color 0.15s, transform 0.15s;
}
.link-card:hover .link-arrow {
  color: var(--accent, var(--green));
  transform: translateX(3px);
}

/* ── Footer ── */
.footer {
  margin-top: 48px;
  font-size: 11px;
  color: #2e2e2e;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}

/* ── Entry animations ── */
.link-card:nth-child(1) { animation: fade-up 0.45s ease 0.18s both; }
.link-card:nth-child(2) { animation: fade-up 0.45s ease 0.24s both; }
.link-card:nth-child(3) { animation: fade-up 0.45s ease 0.30s both; }
.link-card:nth-child(4) { animation: fade-up 0.45s ease 0.36s both; }
.link-card:nth-child(5) { animation: fade-up 0.45s ease 0.42s both; }
.link-card:nth-child(6) { animation: fade-up 0.45s ease 0.48s both; }
.footer { animation: fade-up 0.45s ease 0.55s both; }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
